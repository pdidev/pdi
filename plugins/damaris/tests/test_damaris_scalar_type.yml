logging: debug
pdi:
  metadata:
    nn: int
    mpi_comm: MPI_Comm
    is_client: int
    nbcalls: int
  data:
    int_values: {size: ["$nn"], type: array, subtype: int}
  plugins:
    trace: info
    mpi:
    decl_hdf5:
      - file: 'data_iter${nbcalls}.h5'
        communicator: $mpi_comm
        write: [nn, nbcalls, int_values]
        on_event: write
    damaris:
      architecture:
        communicator: $MPI_COMM_WORLD
        sim_name: damaris_scalar_type
        domains: 1
        dedicated:
          core: 1
          node: 0
      get_is_client: is_client
      client_comm_get: mpi_comm
      datasets:
        - dataset:
            name: int_values
            layout: int_values_layout
            storage: hdf5_storage
      layouts:
        - layout:
            name: int_values_layout
            type: int
            global: ["$nn"]
            dimensions: ["$nn"]
            ghosts: '0:0'
            depends_on: [nn]
      storages:
        - storage:
            name: hdf5_storage
            type: HDF5
            file_mode: Collective
            files_path: ./HDF5_files/
      write: 
        int_values:
          dataset: int_values
          position: ['0']
      log:
        rotation_size: 5
        log_level: info
        flush: true