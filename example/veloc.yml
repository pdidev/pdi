# duration in seconds
duration: 5
# global [height, width] (excluding boundary conditions or ghosts)
datasize: [420, 60]
# degree of parallelism
parallelism: { height: 3, width: 1 }

pdi:
  metadata: # type of small values for which PDI keeps a copy
    iter:   int                                            # current iteration id
    dsize:  { size: 2, type: array, subtype: int }         # local data size including ghosts/boundary
    psize:  { size: 2, type: array, subtype: int }         # number of processes in each dimension
    pcoord: { size: 2, type: array, subtype: int }         # coordinate of the process
    elapsed_offset : double
  data: # type of values for which PDI does not keep a copy
    main_field: { size: [ '$dsize[0]', '$dsize[1]' ], type: array, subtype: double }
  plugins:
    veloc:
      failure : 0 # whether user wants to restore or not 
      config_file: veloc_example.cfg # needed for VeloC internal config 
      checkpoint_label : example # needed by VeloC to name checkpoint files 
      iteration : iter # needed by VeloC to name checkpoint files 
      managed_checkpointing:
        protect_data: [iter, main_field,elapsed_offset] # data to be checkpointed or recovered, iter must be included
        synchronize_on: newiter # PDI_event to check status and consequently checkpoint/recover  
        when : '$iter % 1000 = 0'

