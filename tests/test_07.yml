# the alpha parameter
alpha: 0.125
# global data-size (excluding the number of ghost layers for boundary conditions)
global_size: { height: 60, width: 40 }
# degree of parallelism (number of blocks in each dimension)
parallelism: { height: 2, width: 2 }

pdi:
  include:
    - /opt/repositories/includeYamlQuater/pdi/tests/test_07_data.yml
  logging: trace
  metadata:
    input: int
  # data: 
    # config_file: test_07_data.yml
  # data:
  #   scalar_data: int
  #   array_data:
  #     type: array
  #     subtype: int
  #     size: 8
  #     subsize: 4
  #     start: 2
  #   record_data:
  #     type: record
  #     buffersize: 16
  #     members:
  #       a:
  #         disp: 0
  #         type: int
  #       b:
  #         disp: 8
  #         type: pointer
  #         subtype: int

  # plugins: !include test_07_plugins.yml
  plugins:
    serialize:
      scalar_data: scalar_data_serialized
      array_data: array_data_serialized
      record_data: record_data_serialized
    decl_hdf5:
      - file: serialize_test_06.h5
        when: $input=0
        write: [scalar_data_serialized, array_data_serialized, record_data_serialized]
      - file: serialize_test_06.h5
        when: $input=1
        read: [scalar_data_serialized, array_data_serialized, record_data_serialized]
